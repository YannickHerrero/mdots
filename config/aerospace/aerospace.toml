# AeroSpace — macOS tiling window manager.
# Mirrors the glazewm config from ~/dev/windot/glzr/glazewm/config.yaml so the
# desktop UX is identical across Windows + macOS.

start-at-login = true

# Normalizations keep the tree well-formed after closes/moves.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows monitor focus (rough analog of glazewm's cursor_jump).
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 12
outer.bottom = 12
outer.top = 12
outer.right = 12

[mode.main.binding]
# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-left = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
alt-right = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'

# Resize (50px ≈ 2% on a 2560-wide display, matching glazewm's 2% step)
alt-u = 'resize width -50'
alt-p = 'resize width +50'
alt-o = 'resize height +50'
alt-i = 'resize height -50'

# Resize binding mode (h/j/k/l or arrows; esc/enter to exit)
alt-v = 'mode resize'

# Layout / window state
alt-t = 'layout tiling floating'
alt-shift-t = 'layout floating tiling'
alt-f = 'fullscreen'
alt-q = 'close'

# Toggle container orientation (glazewm: toggle-tiling-direction).
# `split` is incompatible with enable-normalization-flatten-containers;
# `layout horizontal vertical` toggles tile orientation directly instead.
alt-r = 'layout horizontal vertical'

# Reload, pause, redraw
alt-shift-r = 'reload-config'
alt-shift-p = 'enable toggle'
alt-shift-w = 'flatten-workspace-tree'

# Workspace focus
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move focused window to workspace and follow
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

# Cycle workspaces
alt-s = 'workspace next'
alt-d = 'workspace-back-and-forth'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height -50'
k = 'resize height +50'
l = 'resize width +50'
left = 'resize width -50'
down = 'resize height -50'
up = 'resize height +50'
right = 'resize width +50'
esc = 'mode main'
enter = 'mode main'

# Window rules: float picture-in-picture popups for major browsers.
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
if.window-title-regex-substring = '[Pp]icture.in.[Pp]icture'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = '[Pp]icture.in.[Pp]icture'
run = 'layout floating'
